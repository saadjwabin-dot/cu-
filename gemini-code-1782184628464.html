<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>담배 재고 관리 (URL 연동형)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
            margin-top: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        .cigar-name {
            text-align: left;
            font-weight: 500;
        }
        input[type="number"] {
            width: 80%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        .btn-container {
            position: sticky;
            bottom: 20px;
            margin-top: 20px;
            text-align: center;
        }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:hover { background-color: #0056b3; }
        .alert {
            display: none;
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
        /* 🌙 다크 모드 (시스템 설정에 따라 자동 적용) */
@media (prefers-color-scheme: dark) {
    body {
        background-color: #121212;
        color: #e0e0e0;
    }
    
    table {
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
    }
    
    th, td {
        border: 1px solid #333; /* 테두리를 어둡게 변경 */
    }
    
    th {
        background-color: #242424; /* 표 헤더 배경색 */
        color: #ffffff;
    }
    
    /* 입력창(input) 다크 모드 스타일링 */
    input {
        background-color: #1e1e1e;
        color: #e0e0e0;
        border: 1px solid #444;
    }
    
    input:focus {
        outline: none;
        border-color: #777; /* 클릭 시 테두리 색상 강조 */
        background-color: #2a2a2a;
    }
    
    /* placeholder(안내 문구) 색상 조정 */
    input::placeholder {
        color: #666;
    }
}
    </style>
</head>

</div>
