<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재고 관리표</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 600px;
            margin-top: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f4f4f4;
            font-weight: bold;
        }
        td:first-child {
            text-align: left;
            font-weight: 500;
        }
        input {
            width: 80%;
            padding: 5px;
            text-align: right;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h2>📦 재고 관리표</h2>
    <table id="inventoryTable">
        <thead>
            <tr>
                <th>cigarname</th>
                <th>전산재고</th>
                <th>현재고</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        // 1. 제공된 데이터 배열
        const data = {
            "cigarname": [
                "아일랜드 클릭","블러쉬 클릭","퍼플 부스트","샤인 부스트","부스트",
                "보라보라 클릭","썬키스 클릭","다크 토바코","토바코 스위치","프레스코",
                "던힐 6mg","던힐 3mg","던힐 1mg","던힐 프로스트","멜로우 크러쉬",
                "뉴욕","파리","런던","파인컷 3mg","파인컷 1mg","파인컷 울트라","파인컷 프로스트"
            ]
        };

        const tbody = document.querySelector("#inventoryTable tbody");
        
        // 2. 현재 URL의 쿼리 스트링(파라미터) 읽어오기
        const urlParams = new URLSearchParams(window.location.search);

        // 3. 입력 값이 변경될 때마다 URL을 업데이트하는 함수
        function updateURL() {
            const params = new URLSearchParams();
            const rows = tbody.querySelectorAll("tr");
            
            rows.forEach((row, index) => {
                const sysVal = row.querySelector(".sys-input").value;
                const curVal = row.querySelector(".cur-input").value;
                
                // 값이 입력된 경우에만 파라미터 추가 (s = 전산재고, c = 현재고)
                if (sysVal !== "") params.set(`s${index}`, sysVal);
                if (curVal !== "") params.set(`c${index}`, curVal);
            });

            // 페이지 새로고침 없이 URL만 변경
            const newUrl = `${window.location.pathname}?${params.toString()}`;
            window.history.replaceState({}, '', newUrl);
        }

        // 4. 테이블 행 동적 생성
        data.cigarname.forEach((name, index) => {
            const tr = document.createElement("tr");

            // cigarname 셀
            const tdName = document.createElement("td");
            tdName.textContent = name;

            // 전산재고 셀 및 입력란
            const tdSys = document.createElement("td");
            const inputSys = document.createElement("input");
            inputSys.type = "number";
            inputSys.className = "sys-input";
            inputSys.placeholder = "0";
            // URL에 해당 인덱스의 저장된 값이 있으면 불러와서 채움
            if (urlParams.has(`s${index}`)) {
                inputSys.value = urlParams.get(`s${index}`);
            }
            inputSys.addEventListener("input", updateURL); // 입력 시 URL 업데이트
            tdSys.appendChild(inputSys);

            // 현재고 셀 및 입력란
            const tdCur = document.createElement("td");
            const inputCur = document.createElement("input");
            inputCur.type = "number";
            inputCur.className = "cur-input";
            inputCur.placeholder = "0";
            // URL에 해당 인덱스의 저장된 값이 있으면 불러와서 채움
            if (urlParams.has(`c${index}`)) {
                inputCur.value = urlParams.get(`c${index}`);
            }
            inputCur.addEventListener("input", updateURL); // 입력 시 URL 업데이트
            tdCur.appendChild(inputCur);

            // 행에 셀 추가 후 테이블에 붙이기
            tr.appendChild(tdName);
            tr.appendChild(tdSys);
            tr.appendChild(tdCur);
            tbody.appendChild(tr);
        });
    </script>

</body>
</html>
