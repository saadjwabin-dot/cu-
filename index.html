<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재고 관리표</title>
    <style>
        /* 기본 라이트 모드 스타일 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
            background-color: #ffffff;
            color: #333333;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 650px;
            margin-top: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f4f4f4;
            font-weight: bold;
        }
        td:first-child {
            text-align: left;
            font-weight: 500;
        }
        input {
            width: 80%;
            padding: 5px;
            text-align: right;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        
        /* 오차 란 텍스트 기본 스타일 */
        .error-cell {
            font-weight: bold;
            background-color: #fcfcfc;
        }
        .error-zero { color: #2e7d32; } /* 오차가 0일 때 (초록) */
        .error-diff { color: #d32f2f; } /* 오차가 있을 때 (빨강) */

        /* 🌙 다크 모드 (시스템 설정에 따라 자동 적용) */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            table {
                box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
            }
            th, td {
                border: 1px solid #333;
            }
            th {
                background-color: #242424;
                color: #ffffff;
            }
            input {
                background-color: #1e1e1e;
                color: #e0e0e0;
                border: 1px solid #444;
            }
            input:focus {
                outline: none;
                border-color: #777;
                background-color: #2a2a2a;
            }
            input::placeholder {
                color: #666;
            }
            
            /* 다크 모드용 오차 란 색상 조정 */
            .error-cell {
                background-color: #1a1a1a;
            }
            .error-zero { color: #81c784; } /* 밝은 초록 */
            .error-diff { color: #e57373; } /* 밝은 빨강 */
        }
    </style>
</head>
<body>

    <h2>📦 재고 관리표</h2>
    <table id="inventoryTable">
        <thead>
            <tr>
                <th>cigarname</th>
                <th>전산재고</th>
                <th>현재고</th>
                <th>오차</th> </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        const data = {
            "cigarname": [
                "아일랜드 클릭","블러쉬 클릭","퍼플 부스트","샤인 부스트","부스트",
                "보라보라 클릭","썬키스 클릭","다크 토바코","토바코 스위치","프레스코",
                "던힐 6mg","던힐 3mg","던힐 1mg","던힐 프로스트","멜로우 크러쉬",
                "뉴욕","파리","런던","파인컷 3mg","파인컷 1mg","파인컷 울트라","파인컷 프로스트"
            ]
        };

        const tbody = document.querySelector("#inventoryTable tbody");
        const urlParams = new URLSearchParams(window.location.search);

        function updateURL() {
            const params = new URLSearchParams();
            const rows = tbody.querySelectorAll("tr");
            
            rows.forEach((row, index) => {
                const sysVal = row.querySelector(".sys-input").value;
                const curVal = row.querySelector(".cur-input").value;
                
                if (sysVal !== "") params.set(`s${index}`, sysVal);
                if (curVal !== "") params.set(`c${index}`, curVal);
            });

            const newUrl = `${window.location.pathname}?${params.toString()}`;
            window.history.replaceState({}, '', newUrl);
        }

        data.cigarname.forEach((name, index) => {
            const tr = document.createElement("tr");

            // 1. 제품명 셀
            const tdName = document.createElement("td");
            tdName.textContent = name;

            // 2. 전산재고 셀
            const tdSys = document.createElement("td");
            const inputSys = document.createElement("input");
            inputSys.type = "number";
            inputSys.className = "sys-input";
            inputSys.placeholder = "0";
            if (urlParams.has(`s${index}`)) {
                inputSys.value = urlParams.get(`s${index}`);
            }
            tdSys.appendChild(inputSys);

            // 3. 현재고 셀
            const tdCur = document.createElement("td");
            const inputCur = document.createElement("input");
            inputCur.type = "number";
            inputCur.className = "cur-input";
            inputCur.placeholder = "0";
            if (urlParams.has(`c${index}`)) {
                inputCur.value = urlParams.get(`c${index}`);
            }
            tdCur.appendChild(inputCur);

            // 4. 오차 셀 (텍스트 전용)
            const tdError = document.createElement("td");
            tdError.className = "error-cell";
            tdError.textContent = "-";

            // 오차 계산 함수 (전산재고 - 현재고)
            function calculateError() {
                const sysVal = inputSys.value;
                const curVal = inputCur.value;

                // 둘 중 하나라도 입력값이 있을 때만 계산
                if (sysVal !== "" || curVal !== "") {
                    // 값이 비어있으면 0으로 처리하여 계산
                    const sysNum = parseInt(sysVal) || 0;
                    const curNum = parseInt(curVal) || 0;
                    const diff = sysNum - curNum;
                    
                    tdError.textContent = diff;

                    // 색상 초기화 후 값에 따라 클래스 부여
                    tdError.classList.remove("error-zero", "error-diff");
                    if (diff === 0) {
                        tdError.classList.add("error-zero");
                    } else {
                        tdError.classList.add("error-diff");
                    }
                } else {
                    // 둘 다 비어있으면 표시 초기화
                    tdError.textContent = "-";
                    tdError.classList.remove("error-zero", "error-diff");
                }
            }

            // 입력값이 바뀔 때마다 URL 업데이트 및 오차 계산 실행
            inputSys.addEventListener("input", () => {
                updateURL();
                calculateError();
            });
            inputCur.addEventListener("input", () => {
                updateURL();
                calculateError();
            });

            // 초기 로딩 시 URL에 값이 있었다면 오차 계산 바로 적용
            calculateError();

            // 행 조립
            tr.appendChild(tdName);
            tr.appendChild(tdSys);
            tr.appendChild(tdCur);
            tr.appendChild(tdError);
            tbody.appendChild(tr);
        });
    </script>

</body>
</html>
